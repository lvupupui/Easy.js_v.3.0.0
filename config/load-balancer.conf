upstream easyjs_app {
  least_conn;
  server easyjs:3000;
}

server {
  listen 80;
  server_name _;

  location /health {
    proxy_pass http://easyjs_app;
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_pass http://easyjs_app;
  }
}
