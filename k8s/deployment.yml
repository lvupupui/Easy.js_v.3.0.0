apiVersion: apps/v1
kind: Deployment
metadata:
  name: easyjs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: easyjs
  template:
    metadata:
      labels:
        app: easyjs
    spec:
      containers:
        - name: easyjs
          image: easyjs:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: easyjs-config
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: easyjs
spec:
  selector:
    app: easyjs
  ports:
    - port: 80
      targetPort: 3000
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: easyjs-config
data:
  NODE_ENV: production
  PORT: "3000"
