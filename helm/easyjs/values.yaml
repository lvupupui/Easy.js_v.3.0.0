replicaCount: 2

image:
  repository: easyjs
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

containerPort: 3000

env:
  NODE_ENV: production
  PORT: "3000"
  AI_PROVIDER: openai

secrets:
  enabled: false
  name: easyjs-secrets

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false
  className: ""
  hosts:
    - host: easyjs.local
      paths:
        - path: /
          pathType: Prefix
